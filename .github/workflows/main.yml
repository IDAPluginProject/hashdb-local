name: CI Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container: python:3.11-bookworm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r hashdb_builder/requirements.txt

      - name: Run tests
        run: |
          python -c "from hashdb_builder.tests import test_algorithms; test_algorithms.test_algorithm_attributes();"
          python -c "from hashdb_builder.tests import test_algorithms; test_algorithms.test_algorithm_hash();"
          python -c "from hashdb_builder.tests import test_algorithms; test_algorithms.test_algorithm_duplicates();"
          python -c "from hashdb_builder.tests import test_algorithms; test_algorithms.test_custom_api_algorithms();"

  release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install -r hashdb_builder/requirements.txt

      - name: Run build
        run: python hashdb_builder/hashdb_builder.py

      - name: Patch hashdb (replase requests module with hashdb_hook)
        run: patch -N hashdb.py < local.patch

      - name: Clean old zips
        run: rm -f hashdb-local.zip hashdb-local-release.zip

      - name: Zip db
        run: zip hashdb-local-release.zip -j ./hashdb_builder/db/tools/hashdb.sqlite3

      - name: Zip scripts
        run: zip -r ./hashdb-local-release.zip ./hashdb_hook/ ./hashdb.py -x **/README.md

      - name: Create GitHub Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ./hashdb-local-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
